<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Mind Reset Daily MR Logo</title>
  <desc id="desc">A dark circular badge with cyan neon rings and white MR lettering.</desc>
  <defs>
